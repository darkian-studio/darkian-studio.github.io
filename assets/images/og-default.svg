<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="8" fill="#58a6ff"/>
  <rect x="20" y="20" width="1160" height="590" rx="16" fill="none" stroke="#30363d" stroke-width="2"/>

  <!-- terminal-style prompt motif -->
  <g transform="translate(80,96)">
    <circle cx="0" cy="0" r="7" fill="#f85149"/>
    <circle cx="24" cy="0" r="7" fill="#d29922"/>
    <circle cx="48" cy="0" r="7" fill="#3fb950"/>
  </g>

  <image href="watermark.png" x="80" y="150" width="120" height="120"/>

  <text x="80" y="360" font-size="76" font-weight="700" fill="#f0f6fc">Darkian Studio</text>
  <text x="80" y="430" font-size="38" font-weight="400" fill="#c9d1d9">A real, mobile-first IDE for Android &amp; Linux</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="80" y="520" font-size="26" fill="#8b949e">editor · terminal · LSP · debugging · git · extensions</text>
    <text x="80" y="566" font-size="24" fill="#58a6ff">darkian-studio.github.io</text>
  </g>
</svg>
